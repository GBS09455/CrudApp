<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Create Item</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="min-height:100vh;">

<div class="bg-white rounded p-4" style="width:360px;">
  <h2 class="text-center mb-3">Create Item</h2>

  <label class="form-label">ID</label>
  <input type="text" id="idInput" class="form-control mb-2" />

  <label class="form-label">Name</label>
  <input type="text" id="nameInput" class="form-control mb-2" />

  <label class="form-label">Description</label>
  <input type="text" id="descInput" class="form-control mb-3" />

  <div class="d-flex gap-2">
    <button class="btn btn-light flex-fill" onclick="createItem()">Save</button>
    <button class="btn btn-light flex-fill" onclick="location.href='/items.html'">View All</button>
  </div>
  <p id="formMsg" class="text-center fw-bold mt-3 mb-0"></p>
</div>

<script>
  document.documentElement.lang = navigator.language;

  function createItem() {
    const idVal = document.getElementById('idInput').value;
    const body = {
      ...(idVal ? { id: parseInt(idVal) } : {}),
      name: document.getElementById('nameInput').value,
      description: document.getElementById('descInput').value
    };

    const msgEl = document.getElementById('formMsg');
    msgEl.textContent = '';
    msgEl.className = 'msg';

    fetch('/items', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept-Language': navigator.language },
      body: JSON.stringify(body)
    })
    .then(res => {
      if (!res.ok) {
        return res.text().then(text => { throw new Error(text); });
      }
      return res.json();
    })
    .then(created => {
      msgEl.className = 'text-center fw-bold mt-3 mb-0 text-success';
      msgEl.textContent = created.name + ' created!';
      document.getElementById('idInput').value = '';
      document.getElementById('nameInput').value = '';
      document.getElementById('descInput').value = '';
      setTimeout(() => location.href = '/items.html', 1500);
    })
    .catch(err => {
      msgEl.className = 'text-center fw-bold mt-3 mb-0 text-danger';
      msgEl.textContent = `Error: ${err.message}`;
    });
  }
</script>

</body>
</html>
