<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Items</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light p-4">

<div class="container bg-white rounded p-4" style="max-width: 700px;">
  <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-light" onclick="location.href='/items-paged.html'">Create New Item</button>
  </div>

  <h2 class="text-center mb-3">All Items</h2>
  <table class="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody id="itemsList"></tbody>
  </table>
</div>

<script>
  document.documentElement.lang = navigator.language;

  function getItems() {
    fetch('/items')
      .then(res => res.json())
      .then(items => {
        document.getElementById('itemsList').innerHTML = items.map(item => `
          <tr>
            <td>${item.id}</td>
            <td>${item.name}</td>
            <td>${item.description ?? ''}</td>
          </tr>`).join('');
      });
  }

  getItems();
</script>

</body>
</html>
